[pytest]
# Add project root to PYTHONPATH before collecting tests
pythonpath = .

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = -v --tb=short

# Ignore directories
norecursedirs = .git __pycache__ node_modules frontend backend/node_modules chroma_data

# Markers
markers =
    integration: integration tests that test multiple components together
    slow: tests that take a long time to run
